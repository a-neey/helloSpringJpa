<!DOCTYPE html>
<html lang="ko_KR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 등록</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        header { font-size: 13px; color: #888; margin-bottom: 24px; }
        input[type="text"] { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; width: 240px; font-size: 14px; }
        input[type="text"]:focus { outline: none; border-color: #aaa; }
        button { padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; background: white; font-size: 14px; text-decoration: none; color: #333; }
        button:hover { background: #f5f5f5; }
        .back {  display: inline-block; padding: 8px 16px; border: 1px solid #434343; border-radius: 4px; cursor: pointer; background: white; font-size: 14px; text-decoration: none; color: #434343; margin-bottom: 16px;}
        .back:hover { background: #434343; color: #FFFFFF }
        .form { display: flex; flex-direction: row; gap: 5px}
        .form-group { display: flex; flex-direction: column; gap: 10px}
        .error { color: red; font-size: 13px; margin-left: 8px; font-weight: 600 }
    </style>
</head>
<body>

<header>
    <p th:text="${'실습 수행 일시 : ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss') + ' | 학번 : 2371429 | 성명 : 김예나'}"></p>
</header>

<a class="back" href="/categories">← 목록으로</a>

<form class="form" th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
    <div class="form-group">
        <input type="text" th:field="*{name}" placeholder="카테고리 이름"/>
        <span class="error" th:errors="*{name}"></span>
    </div>
    <div class="form-group">
        <button type="submit" class="btn-submit">등록</button>
    </div>
</form>


</body>
</html>
